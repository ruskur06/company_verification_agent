<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Company Verification Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <div class="top-row">
                <h1>Company Verification Agent</h1>
                {% include "partials/operator_logout.html" %}
            </div>
            <p class="muted">
                Run a preliminary company check using local tools.
                The result is not final until human review.
            </p>

            <form action="/internal/run-check" method="post" class="form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label>
                    Company name
                    <input
                        type="text"
                        name="company_name"
                        placeholder="Servochron"
                        required
                    >
                </label>

                <label>
                    Country
                    <input
                        type="text"
                        name="country"
                        placeholder="USA"
                        required
                    >
                </label>

                <label>
                    Domain / website, optional
                    <input
                        type="text"
                        name="domain"
                        placeholder="example.com"
                    >
                </label>

                <button type="submit">Run check</button>
            </form>

            <div class="links">
                <a href="/internal/checks">View checks history</a>
                <a href="/internal/requests">View check requests</a>
                <a href="/docs">Open API docs</a>
                <a href="/company-check">View JSON checks</a>
            </div>
        </section>
    </main>
</body>
</html>
